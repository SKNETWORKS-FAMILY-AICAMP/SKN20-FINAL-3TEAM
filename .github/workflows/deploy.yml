name: Deploy to EC2

on:
  push:
    branches: [backtopython]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/SKN20-FINAL-3TEAM
            git pull origin backtopython

            # Python FastAPI
            source venv/bin/activate
            pip install -r python/requirements.txt --quiet
            sudo systemctl restart skn20

            # Spring Boot
            cd Backend
            mvn package -DskipTests -q
            sudo systemctl restart springboot
            cd ..

            # React
            cd final-frontend-ts
            npm install --silent
            npx vite build
            sudo systemctl restart nginx
            cd ..

            echo "All services deployed!"
